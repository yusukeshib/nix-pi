name: Cron

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: write

concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  cron:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: pi
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update version and models
        id: update
        run: ./update.sh

      - name: Commit and push changes
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet --exit-code VERSION.json models.generated.ts package-lock.json; then
            echo "No changes to commit"
            exit 0
          fi

          version="${{ steps.update.outputs.version }}"

          push_tag=false
          if [[ "${{ steps.update.outputs.version_changed }}" == "true" ]]; then
            git add VERSION.json models.generated.ts package-lock.json
            git commit -m "Update pi to ${version}"

            if ! git ls-remote --tags --refs origin "refs/tags/${version}" | grep -q .; then
              git tag -a "${version}" -m "${version}"
              push_tag=true
            fi
          else
            git add models.generated.ts package-lock.json
            if [[ "${{ steps.update.outputs.models_changed }}" == "true" ]]; then
              git commit -m "Update models"
            else
              git commit -m "Update package-lock"
            fi
          fi

          git push origin "HEAD:${DEFAULT_BRANCH}"
          if [[ "$push_tag" == "true" ]]; then
            git push origin "refs/tags/${version}"
          fi
