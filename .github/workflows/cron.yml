name: Cron

on:
  workflow_dispatch:
  schedule:
    # Hourly so new pi releases are picked up fast (upstream pi.nix runs once/day).
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.update.outputs.version }}
      version_changed: ${{ steps.update.outputs.version_changed }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: nix-pi
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Update version and models
        id: update
        run: ./update.sh

      - name: Commit and push changes
        id: push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet --exit-code VERSION.json models.generated.ts package-lock.json bun.lock coding-agent/bun.nix; then
            echo "No changes to commit"
          else
            version="${{ steps.update.outputs.version }}"
            push_tag=false
            if [[ "${{ steps.update.outputs.version_changed }}" == "true" ]]; then
              git add VERSION.json models.generated.ts package-lock.json bun.lock coding-agent/bun.nix
              git commit -m "Update pi to ${version}"
              if ! git ls-remote --tags --refs origin "refs/tags/${version}" | grep -q .; then
                git tag -a "${version}" -m "${version}"
                push_tag=true
              fi
            else
              git add models.generated.ts package-lock.json bun.lock coding-agent/bun.nix
              if [[ "${{ steps.update.outputs.models_changed }}" == "true" ]]; then
                git commit -m "Update models"
              else
                git commit -m "Update lockfiles"
              fi
            fi
            git push origin "HEAD:${BRANCH}"
            if [[ "$push_tag" == "true" ]]; then
              git push origin "refs/tags/${version}"
            fi
          fi

          # Always emit the commit to build (new or existing) so the build job
          # checks out a ref that exists on the remote.
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14 # Apple Silicon (aarch64-darwin)
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out built revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: nix-pi
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build coding-agent (npm)
        run: nix build .#coding-agent --no-link --print-build-logs

      - name: Build coding-agent-bun
        continue-on-error: true
        run: nix build .#coding-agent-bun --no-link --print-build-logs
